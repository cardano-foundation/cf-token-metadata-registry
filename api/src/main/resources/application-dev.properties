# Profile-specific overrides - these are layered on top of application.properties.
# Only values that differ from the base configuration need to be specified here.

# Docker Compose - auto-start services in dev, using preprod network
spring.docker.compose.enabled=true
spring.docker.compose.file=../docker-compose.yml
spring.docker.compose.lifecycle-management=start-and-stop
spring.docker.compose.stop.command=down
spring.docker.compose.env-file=.env.preprod

# Postgres Config
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cf_token_metadata_registry}
spring.datasource.driverClassName=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME:cardano}
spring.datasource.password=${DB_PASSWORD:metadata1337_}

