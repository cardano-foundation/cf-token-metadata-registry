springdoc.api-docs.path=/apidocs
springdoc.show-actuator=true
springdoc.swagger-ui.enabled=false
spring.jackson.default-property-inclusion=NON_NULL
server.compression.enabled=true
server.compression.mime-types=text/html,text/plain,text/css,application/javascript,application/json
server.compression.min-response-size=1024
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.metrics.tags.application=cf-token-metadata-registry
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.startup.include=db,onchainConnection
management.endpoint.health.group.liveness.include=livenessState,offchainSync,onchainConnection
management.endpoint.health.group.readiness.include=readinessState,offchainSync,onchainReadiness,db

# Disable open-in-view to prevent lazy-loading queries during view rendering
spring.jpa.open-in-view=false

# Virtual threads (JDK 25+)
spring.threads.virtual.enabled=true

# Docker Compose — disabled by default (production), enable via dev profile
spring.docker.compose.enabled=false

# Structured logging — text on console, ECS (Elastic Common Schema) to file
logging.structured.format.file=${LOG_STRUCTURED_FORMAT:ecs}
logging.file.name=${LOG_FILE:logs/application.log}

# Unused properties - can be removed in future cleanup
# cardano.offchain-metadata-registry.network-source-mappings.mainnet=mainnet
# cardano.offchain-metadata-registry.network-source-mappings.preprod=testnet
# cardano.offchain-metadata-registry.network-source-mappings.preview=testnet

# Postgres Config
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cf_token_metadata_registry}
spring.datasource.driverClassName=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME:cardano}
spring.datasource.password=${DB_PASSWORD:}

# Flyway Config
spring.flyway.url=${DB_URL:jdbc:postgresql://localhost:5432/cf_token_metadata_registry}
spring.flyway.user=${DB_USERNAME:cardano}
spring.flyway.password=${DB_PASSWORD:}
spring.flyway.schemas=${DB_SCHEMA:}
spring.flyway.baselineOnMigrate=true
spring.flyway.enabled=true
spring.flyway.validateMigrationNaming=true

spring.flyway.out-of-order=true
spring.flyway.locations[0]=classpath:db/migration/postgresql
spring.flyway.locations[1]=classpath:db/store/{vendor}

# Git Configuration
git.organization=${GITHUB_ORGANIZATION:cardano-foundation}
git.projectName=${GITHUB_PROJECT_NAME:cardano-token-registry}
git.mappingsFolder=${GITHUB_MAPPINGS_FOLDER:mappings}
git.tmp.folder=${GITHUB_TMP_FOLDER:/tmp}
git.forceClone=${GITHUB_FORCE_CLONE:false}

# Github Token Metadata Sync
token.metadata.job.enabled=${TOKEN_METADATA_SYNC_JOB:false}

## CIPs configuration
cip.query.priority=CIP_68,CIP_26

## CIP-113 Programmable Token Configuration
## CIP-113 is enabled when at least one registry NFT policy ID is configured
cip113.registry.nft.policy-ids=${CIP113_REGISTRY_NFT_POLICY_IDS:}

# Yaci Store Configuration
apiPrefix=/yaci
# disable utxo controllers
store.utxo.api-enabled=false

store.cardano.protocol-magic=764824073
store.cardano.host=backbone.mainnet.cardanofoundation.org
store.cardano.port=3001

## Day the CIP was created
store.cardano.sync-start-slot=65836843
store.cardano.sync-start-blockhash=cb09cae9c54026afebfe6124189600fc0f76c2299bc9f9c32305944979a12fed
store.blocks.epoch-calculation-interval=14400  # 14400 = 4 hours

#Auto Recovery on Yaci-Store available on yaci-store-admin module
store.admin.auto-recovery-enabled=true
store.admin.health-check-interval=20

#####################################
# Admin UI Configuration
# Admin UI can be accessed at http://ip:port/admin-ui/
#####################################
store.admin.ui.enabled=true
# Enable/disable sync control operations (start/stop/restart) in Admin UI.
# When disabled, sync control buttons are hidden and API endpoints return 403.
# Also disabled automatically when store.read-only-mode=true
store.admin.ui.sync-control-enabled=true
# Header text displayed in Admin UI
store.admin.ui.header-text=CF Token Metadata Registry Admin - Powered by Yaci Store
