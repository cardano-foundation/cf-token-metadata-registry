springdoc.api-docs.path=/apidocs
springdoc.show-actuator=true
springdoc.swagger-ui.enabled=false
spring.jackson.default-property-inclusion=NON_NULL
server.compression.enabled=true
server.compression.mime-types=text/html,text/plain,text/css,application/javascript,application/json
server.compression.min-response-size=1024
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.metrics.tags.application=cf-token-metadata-registry
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
# Health indicator bean IDs come from assets-ext's @Component names
# (assetStore* prefix avoids collisions across yaci-store extensions).
# Each indicator is @ConditionalOnBean(...), so it is silently skipped from a group
# when absent (e.g. read-only mode, or cip26 cron disabled for externally-managed sync).
management.endpoint.health.group.startup.include=db,assetStoreOnchainConnection
management.endpoint.health.group.liveness.include=livenessState,assetStoreOnchainConnection
management.endpoint.health.group.readiness.include=readinessState,assetStoreOffchainSync,assetStoreOnchainReadiness,db

# Disable open-in-view to prevent lazy-loading queries during view rendering
spring.jpa.open-in-view=false

# Virtual threads (JDK 25+)
spring.threads.virtual.enabled=true

# Docker Compose - disabled by default (production), enable via dev profile
spring.docker.compose.enabled=false

# Structured logging
logging.structured.format.file=${LOG_STRUCTURED_FORMAT:ecs}
logging.file.name=${LOG_FILE:logs/application.log}

# Postgres Config
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cf_token_metadata_registry}
spring.datasource.driverClassName=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME:cardano}
spring.datasource.password=${DB_PASSWORD:}

# Flyway - runs assets-ext's migrations from its jar (db/migration/postgresql, db/store/{vendor})
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true

# Yaci Store - assets-ext extension (CIP-26 / CIP-68 / CIP-113)
store.assets.ext.enabled=true
# CIP-26 in-process scheduled GitHub sync. Set to false in prod when the K8s CronJob
# handles sync externally via the job module; keep true in dev/docker-compose.
store.assets.ext.cip26.enabled=${STORE_ASSETS_EXT_CIP26_ENABLED:true}
store.assets.ext.cip26.git-organization=${GITHUB_ORGANIZATION:cardano-foundation}
store.assets.ext.cip26.git-project-name=${GITHUB_PROJECT_NAME:cardano-token-registry}
store.assets.ext.cip26.git-mappings-folder=${GITHUB_MAPPINGS_FOLDER:mappings}
store.assets.ext.cip26.git-tmp-folder=${GITHUB_TMP_FOLDER:/tmp}
store.assets.ext.cip26.force-clone=${GITHUB_FORCE_CLONE:false}
store.assets.ext.cip26.sync-interval-minutes=${STORE_ASSETS_EXT_CIP26_SYNC_INTERVAL_MINUTES:60}
store.assets.ext.cip113.registry-nft-policy-ids=${CIP113_REGISTRY_NFT_POLICY_IDS:}
store.assets.ext.query.priority=${CIP_QUERY_PRIORITY:CIP_68,CIP_26}

# Yaci Store - on-chain indexer
apiPrefix=/yaci
# Disable yaci-store's built-in utxo REST controllers (we don't want them exposed)
store.utxo.api-enabled=false

store.cardano.protocol-magic=764824073
store.cardano.host=backbone.mainnet.cardanofoundation.org
store.cardano.port=3001

## Day CIP-68 went live - sync starts here
store.cardano.sync-start-slot=65836843
store.cardano.sync-start-blockhash=cb09cae9c54026afebfe6124189600fc0f76c2299bc9f9c32305944979a12fed
store.blocks.epoch-calculation-interval=14400

# Auto recovery via yaci-store-admin
store.admin.auto-recovery-enabled=true
store.admin.health-check-interval=20

