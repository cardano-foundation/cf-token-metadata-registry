replicaCount: 1

api:
  image:
    repository: cardanofoundation/cf-token-metadata-registry-api
    tag: "0.0.1"
    pullPolicy: Always
  tokenMetadataUpdateJob:
    enabled: true
  startupProbe:
    httpGet:
      path: /actuator/health/startup
      port: http
    # initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: http
    # initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

job:
  enabled: false
  image:
    repository: cardanofoundation/cf-token-metadata-registry-job
    tag: "0.0.1"
    pullPolicy: Always
  cron: "15 * * * *"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  disableActuatorEndpoint: true
  additionalDomains: []

postgres:
  createDb: true
  numberOfInstances: 2
  host: cf-token-metadata-registry-pg
  port: 5432
  dbName: cf_token_metadata_registry
  schema: public
  secret:
    name: cardano.cf-token-metadata-registry-pg.credentials.postgresql.acid.zalan.do
    userKey: username
    hostKey: password


resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

monitoring:
  enabled: true

cardano:
  node:
    host: backbone.cardano.iog.io
    port: 3001
    protocolMagic: "764824073"
    syncStartSlot:
    syncStartBlockhash:
    blocksEpochCalculationInterval:

github:
  organization: "cardano-foundation"
  projectName: "cardano-token-registry"
  mappingsFolder: "mappings"
  tmpFolder: "/tmp"
