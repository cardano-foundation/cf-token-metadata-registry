<!doctype html>
<html>
  <head>
    <title>Cardano Token Metadata Registry - API Reference</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <div id="app"></div>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    <script>
      Scalar.createApiReference('#app', {
        url: 'https://tokens.cardano.org/apidocs',
        proxyUrl: 'https://proxy.scalar.com',
        servers: [
          { url: 'https://tokens.cardano.org', description: 'Production (mainnet)' },
          { url: 'https://preprod.tokens.cardano.org', description: 'Preprod' },
        ],
      })
    </script>
  </body>
</html>
