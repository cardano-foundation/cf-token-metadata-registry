# One-shot CIP-26 sync job. Runs synchronizeDatabase() once and exits.
# Packaged as cardanofoundation/cf-token-metadata-registry-job, intended to be
# triggered by an external K8s CronJob.

# Postgres Config
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cf_token_metadata_registry}
spring.datasource.driverClassName=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME:cardano}
spring.datasource.password=${DB_PASSWORD:}

# Flyway runs assets-ext's own migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true

spring.jpa.open-in-view=false

# assets-ext enabled so TokenMetadataSyncService + repositories are wired in.
store.assets.ext.enabled=true
store.assets.ext.cip26.enabled=true
store.assets.ext.cip26.git-organization=${GITHUB_ORGANIZATION:cardano-foundation}
store.assets.ext.cip26.git-project-name=${GITHUB_PROJECT_NAME:cardano-token-registry}
store.assets.ext.cip26.git-mappings-folder=${GITHUB_MAPPINGS_FOLDER:mappings}
store.assets.ext.cip26.git-tmp-folder=${GITHUB_TMP_FOLDER:/tmp}
store.assets.ext.cip26.force-clone=${GITHUB_FORCE_CLONE:false}
# Scheduled cron fires every N minutes in long-running mode; in this one-shot
# app the CommandLineRunner completes before the first tick, so this value is
# effectively unused.
store.assets.ext.cip26.sync-interval-minutes=60

# Structured logging
logging.structured.format.file=${LOG_STRUCTURED_FORMAT:ecs}
logging.file.name=${LOG_FILE:logs/application.log}
